run_name: OLMo-1B
seed: 6198
dry_run: false

wandb:
  entity: dri-ice          # <-- your team / personal workspace
  project: olmo-small
  
model:
  d_model: 2048
  n_heads: 32
  n_layers: 24
  mlp_hidden_size: 10752
  weight_tying: true
  alibi: false
  rope: true
  flash_attention: false  # not available on AMD
  attention_dropout: 0.0
  attention_layer_norm: false
  multi_query_attention: false
  include_bias: false
  block_type: sequential
  layer_norm_type: default
  layer_norm_with_affine: false
  bias_for_layer_norm: false
  attention_layer_norm_with_affine: false
  activation_type: swiglu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 256
  vocab_size: 50280
  embedding_size: 50304
  eos_token_id: 50279
  pad_token_id: 1
  init_device: cuda
  init_fn: mitchell
# 10922
compile: null  # causes instability on AMD GPUs

optimizer:
  name: adamw
  learning_rate: 5.0e-4
  weight_decay: 0.0
  gamma1: 0.85
  gamma2: 0.999
  theta: 0.999
  update_proj_gap: 1000
  total_T: 38148
  metrics_log_interval: 100000000000000000000

quantization:
  quantize: False

scheduler:
  name: cosine_with_warmup
  t_warmup: 1000
  alpha_f: 0.1

tokenizer:
  identifier: tokenizers/allenai_eleuther-ai-gpt-neox-20b-pii-special.json
  truncate_direction: right

save_folder: runs/${run_name}
try_load_latest_save: true
save_overwrite: true
# Sharded checkpoints (best for restarts)
save_interval: 1000
save_num_checkpoints_to_keep: 1
# Unsharded checkpoints (for final storage)
save_interval_unsharded: 1000
save_num_unsharded_checkpoints_to_keep: -1

load_path: null

max_duration: 38148  # 3.1T tokens
global_train_batch_size: 2048
device_train_microbatch_size: 64

precision: amp_bf16

fsdp:
  wrapping_strategy: null
  precision: mixed
# ddp:
#   find_unused_params: False
max_grad_norm: 10.0
max_grad_norm_ratio: null

speed_monitor:
  window_size: 20

eval_interval: 1000
eval_subset_num_batches: -1
device_eval_batch_size: ${device_train_microbatch_size}
evaluators:
  # lump all the small datasets together (we still get separate metrics).
  - label: v3-small-ppl-validation
    data:
      num_workers: 0
      drop_last: true
      datasets:
       v3-small-c4_en-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/c4_en/val/part-0-00000.npy
       v3-small-dolma_books-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/dolma_books/val/part-0-00000.npy
       v3-small-dolma_common-crawl-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/dolma_common-crawl/val/part-0-00000.npy
       v3-small-dolma_pes2o-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/dolma_pes2o/val/part-0-00000.npy
       v3-small-dolma_reddit-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/dolma_reddit/val/part-0-00000.npy
       v3-small-dolma_stack-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/dolma_stack/val/part-0-00000.npy
       v3-small-dolma_wiki-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/dolma_wiki/val/part-0-00000.npy
       v3-small-ice-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/ice/val/part-0-00000.npy
       v3-small-m2d2_s2orc-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/m2d2_s2orc/val/part-0-00000.npy
       v3-small-pile-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/pile/val/part-0-00000.npy
       v3-small-wikitext_103-validation:
          - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v3_small_gptneox20b/wikitext_103/val/part-0-00000.npy

  - label: v2-small-ppl-validation
    data:
      num_workers: 0
      drop_last: true
      datasets:
        v2-small-4chan-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/4chan/val.npy
        v2-small-c4_100_domains-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/c4_100_domains/val.npy
        v2-small-c4_en-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/c4_en/val.npy
        v2-small-gab-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/gab/val.npy
        v2-small-ice-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/ice/val.npy
        v2-small-m2d2_s2orc-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/m2d2_s2orc/val.npy
        v2-small-m2d2_wiki-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/m2d2_wiki/val.npy
        v2-small-manosphere-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/manosphere/val.npy
        v2-small-mc4_en-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/mc4_en/val.npy
        v2-small-pile-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/pile/val.npy
        v2-small-ptb-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/ptb/val.npy
        v2-small-twitterAEE-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/twitterAEE/val.npy
        v2-small-wikitext_103-validation:
        - /scratch-shared/HTJ/olmo_dataset/val/perplexity/v2_small_gptneox20b/wikitext_103/val.npy


  - label: piqa
    type: downstream

  - label: hellaswag
    type: downstream

  - label: winogrande
    type: downstream

  - label: openbook_qa
    type: downstream

  # - label: boolq  # requires implemention of the pmi_dc matrix
    # type: downstream

  - label: sciq
    type: downstream

  - label: arc_easy
    type: downstream

  # - label: arc_challenge  # requires implemention of the pmi_dc matrix
  #   type: downstream

  - label: copa
    type: downstream

  - label: rte
    type: downstream

  - label: commitment_bank
    type: downstream

  - label: mrpc
    type: downstream

  - label: sst2
    type: downstream

